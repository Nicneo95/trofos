name: QA Integration Tests

on:
  workflow_dispatch:
    inputs:
      shard:
        description: 'Test shard to run (1 or 2, or leave empty for both)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  qa-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    timeout-minutes: 60
    env:
      CI: true
      BASE_URL: 'https://trofos-production.comp.nus.edu.sg'
      TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/hydrogen'

      - name: Install dependencies
        working-directory: packages/frontend/qa-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/frontend/qa-tests
        run: npx playwright install --with-deps

      - name: Run QA tests (Shard ${{ matrix.shard }}/2)
        working-directory: packages/frontend/qa-tests
        run: npx playwright test --config=playwright.qa.config.ts --shard=${{ matrix.shard }}/2

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/frontend/qa-tests/playwright-report-qa/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: packages/frontend/qa-tests/blob-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: packages/frontend/qa-tests/test-results.xml
          retention-days: 30
          if-no-files-found: ignore

  merge-reports:
    name: Merge test reports
    if: always()
    needs: qa-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/hydrogen'

      - name: Install dependencies
        working-directory: packages/frontend/qa-tests
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-shard-*
          path: all-blobs
          merge-multiple: true

      - name: Merge reports
        working-directory: packages/frontend/qa-tests
        run: |
          PLAYWRIGHT_HTML_OUTPUT_DIR=merged-report npx playwright merge-reports --reporter html ../../../all-blobs/

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: packages/frontend/qa-tests/merged-report/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.readFileSync('packages/frontend/qa-tests/test-results.xml', 'utf8');
            const match = testResults.match(/tests="(\d+)"/);
            const passedMatch = testResults.match(/failures="0"/);
            const failedMatch = testResults.match(/failures="(\d+)"/);

            const result = passedMatch ? '✅ All tests passed!' : `❌ Some tests failed`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## QA Integration Tests\n\n${result}\n\nView the [detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
